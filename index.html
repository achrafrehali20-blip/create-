<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Trading Analysis Dashboard | BTCUSDT</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Technical Indicators Library -->
    <script src="https://cdn.jsdelivr.net/npm/technicalindicators@3.1.0/dist/browser.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #e2e8f0;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(51, 65, 85, 0.5);
            border-radius: 1.25rem;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(59, 130, 246, 0.5);
        }

        .text-buy { color: #10b981; }
        .text-sell { color: #f43f5e; }
        .text-neutral { color: #f59e0b; }
        .bg-buy { background-color: #10b981; }
        .bg-sell { background-color: #f43f5e; }

        /* Hide Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        @keyframes pulse-blue {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-blue { animation: pulse-blue 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Header / Market Summary -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
        <div class="glass-card p-5">
            <p class="text-slate-400 text-sm mb-1">السعر الحالي</p>
            <h2 id="current-price" class="text-3xl font-black tracking-tighter text-buy">$0.00</h2>
        </div>
        <div class="glass-card p-5">
            <p class="text-slate-400 text-sm mb-1">تغير 24 ساعة</p>
            <h2 id="price-change" class="text-2xl font-bold text-buy">+0.00%</h2>
        </div>
        <div class="glass-card p-5">
            <p class="text-slate-400 text-sm mb-1">حجم التداول (24h)</p>
            <h2 id="volume-24h" class="text-xl font-bold">0</h2>
        </div>
        <div class="glass-card p-5">
            <p class="text-slate-400 text-sm mb-1">اتجاه السوق العام</p>
            <h2 id="market-sentiment" class="text-xl font-black uppercase text-neutral">NEUTRAL</h2>
        </div>
        <div class="glass-card p-5">
            <p class="text-slate-400 text-sm mb-1">قوة الإشارة</p>
            <div class="w-full bg-slate-800 h-2 rounded-full mt-2">
                <div id="signal-strength-bar" class="bg-blue-500 h-full rounded-full transition-all duration-500" style="width: 50%"></div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
        <!-- Main Analysis Column -->
        <div class="xl:col-span-2 space-y-8">
            
            <!-- TradingView Chart -->
            <div class="glass-card overflow-hidden h-[500px]" id="chart-container">
                <!-- TradingView Widget BEGIN -->
                <div class="tradingview-widget-container" style="height:100%;width:100%">
                    <div id="tradingview_chart" style="height:100%;width:100%"></div>
                </div>
            </div>

            <!-- Multi-Timeframe Analysis -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="timeframe-grid">
                <!-- Timeframe Cards Generated by JS -->
            </div>

            <!-- Levels and Candles -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Support & Resistance Visualization -->
                <div class="glass-card p-6">
                    <h3 class="text-lg font-bold mb-6 flex items-center gap-2">
                        <i data-lucide="shield-check" class="text-blue-400"></i> المستويات (S/R)
                    </h3>
                    <div class="relative h-64 bg-slate-950/50 rounded-xl p-4 border border-slate-800 flex flex-col justify-between overflow-hidden" id="sr-levels-container">
                        <!-- Levels injected here -->
                    </div>
                </div>

                <!-- Candle Patterns -->
                <div class="glass-card p-6">
                    <h3 class="text-lg font-bold mb-6 flex items-center gap-2">
                        <i data-lucide="zap" class="text-blue-400"></i> تحليل الشموع
                    </h3>
                    <div id="candle-patterns-list" class="space-y-4">
                        <!-- Patterns injected here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Sidebar: AI & Price Action -->
        <div class="space-y-8">
            <!-- AI Smart Recommendation -->
            <div class="glass-card p-6 border-r-4 border-r-blue-500">
                <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <i data-lucide="cpu" class="text-yellow-400"></i> التوصية الذكية (AI)
                </h3>
                <div id="ai-recommendation-text" class="text-4xl font-black mb-6 uppercase text-neutral">NEUTRAL</div>
                <div id="ai-reasons" class="space-y-3 text-sm text-slate-400">
                    <!-- Reasons injected here -->
                </div>
            </div>

            <!-- Price Action Detail -->
            <div class="glass-card p-6">
                <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i data-lucide="bar-chart-3" class="text-blue-400"></i> حركة السعر (15m)
                </h3>
                <div id="price-action-details" class="space-y-4">
                    <!-- Details injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- TradingView Script -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

    <script>
        // --- Configuration & State ---
        const SYMBOL = 'BTCUSDT';
        const TIMEFRAMES = ['5m', '15m', '30m'];
        let state = {
            price: 0,
            ticker: {},
            candles: { '5m': [], '15m': [], '30m': [] },
            analysis: {}
        };

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            initChart();
            initData();
            startWebsocket();
        });

        function initChart() {
            new TradingView.widget({
                "autosize": true,
                "symbol": "BINANCE:" + SYMBOL,
                "interval": "15",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "ar",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "container_id": "tradingview_chart"
            });
        }

        async function initData() {
            // Fetch historical candles for each timeframe
            for (const tf of TIMEFRAMES) {
                const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${SYMBOL}&interval=${tf}&limit=200`);
                const data = await response.json();
                state.candles[tf] = data.map(d => ({
                    time: d[0],
                    open: parseFloat(d[1]),
                    high: parseFloat(d[2]),
                    low: parseFloat(d[3]),
                    close: parseFloat(d[4]),
                    volume: parseFloat(d[5])
                }));
            }
            updateAllAnalysis();
        }

        function startWebsocket() {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws');
            ws.onopen = () => {
                ws.send(JSON.stringify({
                    method: "SUBSCRIBE",
                    params: [
                        `${SYMBOL.toLowerCase()}@ticker`,
                        `${SYMBOL.toLowerCase()}@kline_5m`,
                        `${SYMBOL.toLowerCase()}@kline_15m`,
                        `${SYMBOL.toLowerCase()}@kline_30m`
                    ],
                    id: 1
                }));
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.e === '24hrTicker') {
                    state.ticker = msg;
                    updateSummaryUI();
                } else if (msg.e === 'kline') {
                    const tf = msg.k.i;
                    if (state.candles[tf]) {
                        const newCandle = {
                            time: msg.k.t,
                            open: parseFloat(msg.k.o),
                            high: parseFloat(msg.k.h),
                            low: parseFloat(msg.k.l),
                            close: parseFloat(msg.k.c),
                            volume: parseFloat(msg.k.v)
                        };
                        const last = state.candles[tf][state.candles[tf].length - 1];
                        if (last && last.time === newCandle.time) {
                            state.candles[tf][state.candles[tf].length - 1] = newCandle;
                        } else {
                            state.candles[tf].push(newCandle);
                            state.candles[tf].shift();
                        }
                        updateAllAnalysis();
                    }
                }
            };
        }

        // --- Analysis Logic ---
        function updateAllAnalysis() {
            TIMEFRAMES.forEach(tf => {
                const candles = state.candles[tf];
                const closes = candles.map(c => c.close);
                const highs = candles.map(c => c.high);
                const lows = candles.map(c => c.low);
                const volumes = candles.map(c => c.volume);

                const ema20 = technicalindicators.EMA.calculate({ period: 20, values: closes }).pop() || 0;
                const ema50 = technicalindicators.EMA.calculate({ period: 50, values: closes }).pop() || 0;
                const rsi = technicalindicators.RSI.calculate({ period: 14, values: closes }).pop() || 0;
                const macd = technicalindicators.MACD.calculate({ 
                    values: closes, fastPeriod: 12, slowPeriod: 26, signalPeriod: 9, SimpleMAOscillator: false, SimpleMASignal: false 
                }).pop() || { MACD: 0, signal: 0, histogram: 0 };
                
                const adxResult = technicalindicators.ADX.calculate({ high: highs, low: lows, close: closes, period: 14 }).pop() || { adx: 0, pdi: 0, mdi: 0 };

                // Patterns
                const pattern = detectPattern(candles);

                // Recommendation Score
                let score = 0;
                if (closes[closes.length-1] > ema50) score += 1;
                if (rsi < 35) score += 2; else if (rsi > 65) score -= 2;
                if (macd.histogram > 0) score += 1;

                state.analysis[tf] = {
                    recommendation: score >= 2 ? 'BUY' : score <= -2 ? 'SELL' : 'NEUTRAL',
                    confidence: Math.min(Math.abs(score) * 25, 100),
                    rsi, ema20, ema50, 
                    macd: macd.histogram,
                    adx: adxResult.adx,
                    pattern
                };
            });

            updateUI();
        }

        function detectPattern(candles) {
            const last = candles[candles.length - 1];
            const prev = candles[candles.length - 2];
            const body = Math.abs(last.close - last.open);
            const total = last.high - last.low;
            if (total === 0) return "Neutral";

            if (body < total * 0.1) return "Doji";
            if (last.close > last.open && body > Math.abs(prev.close - prev.open)) return "Bullish Engulfing";
            if (last.close < last.open && body > Math.abs(prev.close - prev.open)) return "Bearish Engulfing";
            if (last.low < Math.min(last.open, last.close) - body * 2) return "Hammer";
            
            return last.close > last.open ? "Bullish" : "Bearish";
        }

        // --- UI Updates ---
        function updateSummaryUI() {
            const ticker = state.ticker;
            if (!ticker.c) return;

            const price = parseFloat(ticker.c);
            const change = parseFloat(ticker.P);
            const priceEl = document.getElementById('current-price');
            
            priceEl.innerText = `$${price.toLocaleString()}`;
            priceEl.className = `text-3xl font-black tracking-tighter ${change >= 0 ? 'text-buy' : 'text-sell'}`;

            const changeEl = document.getElementById('price-change');
            changeEl.innerText = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
            changeEl.className = `text-2xl font-bold ${change >= 0 ? 'text-buy' : 'text-sell'}`;

            document.getElementById('volume-24h').innerText = parseInt(ticker.v).toLocaleString();
        }

        function updateUI() {
            const mainTf = state.analysis['15m'];
            if (!mainTf) return;

            // Update AI Recommendation
            const overallScore = TIMEFRAMES.reduce((acc, tf) => acc + (state.analysis[tf].recommendation === 'BUY' ? 1 : state.analysis[tf].recommendation === 'SELL' ? -1 : 0), 0);
            const recEl = document.getElementById('ai-recommendation-text');
            const sentimentEl = document.getElementById('market-sentiment');
            
            let status = "NEUTRAL";
            if (overallScore >= 2) status = "STRONG BUY";
            else if (overallScore === 1) status = "BUY";
            else if (overallScore === -1) status = "SELL";
            else if (overallScore <= -2) status = "STRONG SELL";

            recEl.innerText = status;
            sentimentEl.innerText = status;
            const colorClass = status.includes("BUY") ? "text-buy" : status.includes("SELL") ? "text-sell" : "text-neutral";
            recEl.className = `text-4xl font-black mb-6 uppercase ${colorClass}`;
            sentimentEl.className = `text-xl font-black uppercase ${colorClass}`;
            
            document.getElementById('signal-strength-bar').style.width = `${Math.abs(overallScore) * 33}%`;
            document.getElementById('signal-strength-bar').className = `h-full rounded-full transition-all duration-500 ${status.includes("BUY") ? 'bg-emerald-500' : 'bg-rose-500'}`;

            // Reasons
            const reasons = [
                `الاتجاه في إطار 15 دقيقة: ${mainTf.recommendation}`,
                `مؤشر RSI حالياً: ${mainTf.rsi.toFixed(2)}`,
                `قوة الاتجاه (ADX): ${mainTf.adx.toFixed(1)}`,
                `نمط الشموع المكتشف: ${mainTf.pattern}`
            ];
            document.getElementById('ai-reasons').innerHTML = reasons.map(r => `<div class="flex items-center gap-2"><div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div>${r}</div>`).join('');

            // Multi-Timeframe Cards
            document.getElementById('timeframe-grid').innerHTML = TIMEFRAMES.map(tf => {
                const data = state.analysis[tf];
                const color = data.recommendation === 'BUY' ? 'text-buy' : data.recommendation === 'SELL' ? 'text-sell' : 'text-neutral';
                return `
                    <div class="glass-card p-4">
                        <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-2">
                            <span class="font-bold uppercase text-blue-400">${tf}</span>
                            <span class="text-xs font-bold ${color}">${data.recommendation}</span>
                        </div>
                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between"><span>RSI</span><span class="font-mono">${data.rsi.toFixed(1)}</span></div>
                            <div class="flex justify-between"><span>MACD</span><span class="font-mono ${data.macd > 0 ? 'text-buy' : 'text-sell'}">${data.macd.toFixed(2)}</span></div>
                            <div class="flex justify-between"><span>Conf.</span><span>${data.confidence}%</span></div>
                        </div>
                    </div>
                `;
            }).join('');

            // S/R Levels
            const currentPrice = state.candles['30m'][state.candles['30m'].length - 1].close;
            const high = Math.max(...state.candles['30m'].slice(-20).map(c => c.high));
            const low = Math.min(...state.candles['30m'].slice(-20).map(c => c.low));
            const r1 = currentPrice + (high - low) * 0.382;
            const r2 = currentPrice + (high - low) * 0.618;
            const s1 = currentPrice - (high - low) * 0.382;
            const s2 = currentPrice - (high - low) * 0.618;

            const levelsHtml = `
                <div class="relative h-full flex flex-col justify-between text-[10px] font-mono">
                    <div class="border-t border-dashed border-rose-500/50 relative"><span class="absolute -top-4 right-0 text-rose-400">RESISTANCE 2: $${r2.toFixed(1)}</span></div>
                    <div class="border-t border-dashed border-rose-400/30 relative"><span class="absolute -top-4 right-0 text-rose-300">RESISTANCE 1: $${r1.toFixed(1)}</span></div>
                    <div class="border-t-2 border-blue-500 relative animate-pulse-blue"><span class="absolute -top-5 left-0 text-blue-400 font-bold text-xs">PRICE: $${currentPrice.toFixed(1)}</span></div>
                    <div class="border-t border-dashed border-emerald-400/30 relative"><span class="absolute top-1 right-0 text-emerald-300">SUPPORT 1: $${s1.toFixed(1)}</span></div>
                    <div class="border-t border-dashed border-emerald-500/50 relative"><span class="absolute top-1 right-0 text-emerald-400">SUPPORT 2: $${s2.toFixed(1)}</span></div>
                </div>
            `;
            document.getElementById('sr-levels-container').innerHTML = levelsHtml;

            // Patterns List
            document.getElementById('candle-patterns-list').innerHTML = TIMEFRAMES.map(tf => `
                <div class="flex justify-between items-center p-3 bg-slate-800/30 rounded-lg">
                    <span class="text-slate-400 font-bold">${tf}</span>
                    <span class="text-slate-100">${state.analysis[tf].pattern}</span>
                </div>
            `).join('');

            // Price Action (15m)
            const ca15 = state.candles['15m'];
            const lastH = Math.max(...ca15.slice(-10).map(c => c.high));
            const lastL = Math.min(...ca15.slice(-10).map(c => c.low));
            document.getElementById('price-action-details').innerHTML = `
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-3 bg-slate-800/30 rounded-lg"><p class="text-[10px] text-slate-500">أعلى قمة (10)</p><p class="font-bold text-rose-400">$${lastH.toFixed(1)}</p></div>
                    <div class="p-3 bg-slate-800/30 rounded-lg"><p class="text-[10px] text-slate-500">أدنى قاع (10)</p><p class="font-bold text-emerald-400">$${lastL.toFixed(1)}</p></div>
                </div>
                <div class="flex justify-between text-sm px-1">
                    <span class="text-slate-400">البعد عن القمة:</span>
                    <span class="text-rose-400 font-mono">${(((lastH - currentPrice) / currentPrice) * 100).toFixed(2)}%</span>
                </div>
                <div class="flex justify-between text-sm px-1">
                    <span class="text-slate-400">البعد عن القاع:</span>
                    <span class="text-emerald-400 font-mono">${(((currentPrice - lastL) / currentPrice) * 100).toFixed(2)}%</span>
                </div>
                <div class="p-3 ${currentPrice > lastH * 0.99 ? 'bg-blue-500/20' : 'bg-slate-800/20'} rounded-lg border border-blue-500/20">
                    <p class="text-xs text-blue-400 font-bold mb-1">حالة الاختراق</p>
                    <p class="text-sm">${currentPrice > lastH ? 'تم كسر القمة للأعلى!' : currentPrice < lastL ? 'تم كسر القاع للأسفل!' : 'لا يوجد كسر حالياً'}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
